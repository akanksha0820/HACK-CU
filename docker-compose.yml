version: '3.8'
services:
  mongo:
    image: mongo:5
    container_name: ecoleaders-mongo
    restart: always
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecoleaders-backend
    restart: always
    ports:
      - '3000:3000'
    depends_on:
      - mongo
    environment:
      - MONGODB_URI=mongodb://mongo:27017/ecoleaders
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:5173}
    volumes:
      - ./frontend/dist:/usr/src/app/public
  frontend:
    image: node:18-alpine
    container_name: ecoleaders-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE_URL=http://backend:3000
    command: sh -c "npm install && npm run dev -- --host"
volumes:
  mongo-data:
